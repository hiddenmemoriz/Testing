name: Add Text to Reel

on:
  workflow_dispatch:   # Run manually from the Actions tab

jobs:
  add-text:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Run script
        run: python add_text.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: reel-with-text
          path: output/reel_with_text.mp4
